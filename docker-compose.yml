services:
  api:
    image: ruby:3.4.5
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./task-list-back:/app
      - rubygems:/usr/local/bundle
    depends_on:
      - postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_HOST: postgres
      FRONTEND_URL: http://localhost:5173
    entrypoint: ./entrypoint.sh

  postgres:
    image: postgres
    environment:
      POSTGRES_DB: task_list_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - database:/var/lib/postgresql/data

  react:
    image: node:24
    working_dir: /react
    ports:
      - "5173:5173"
    volumes:
      - ./task-list-front:/react
    entrypoint: /bin/bash
    command: -c "npm install && npm run dev"

volumes:
  rubygems:
  database: